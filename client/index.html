<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Project We-Go | Cosmos Odyssey</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #020617; 
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* PixiJS 컨테이너 래퍼 - 16:9 비율 유지 (절대 좌표 정중앙 픽스) */
      #app-container {
        width: 1280px;
        height: 720px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transform-origin: center center;
        overflow: hidden;
        background: #000;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      canvas { 
        display: block; 
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="app-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
